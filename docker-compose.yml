version: '3.9'

services:

  frontend:
    build: ./frontend
    container_name: pingvision-frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    command: npm run dev

  backend:
    build: ./backend
    container_name: pingvision-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload